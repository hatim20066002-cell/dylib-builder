name: Build DyLib

on:
  workflow_dispatch:
    inputs:
      archive_url:
        description: 'Download URL for the source archive'
        required: true
      language:
        description: 'Language: c, cpp, swift, mixed'
        required: true
      output_name:
        description: 'Output .dylib filename'
        required: true
      job_id:
        description: 'Unique job ID for tracking'
        required: true

jobs:
  build:
    runs-on: macos-latest

    steps:

      - name: Download and extract source archive
        run: |
          curl -fL "${{ github.event.inputs.archive_url }}" -o project.archive
          mkdir -p source
          if unzip -q project.archive -d source 2>/dev/null; then
            echo "Extracted as ZIP"
          elif tar -xzf project.archive -C source 2>/dev/null; then
            echo "Extracted as tar.gz"
          else
            echo "ERROR: cannot extract" && exit 1
          fi
          find source -name '__MACOSX' -exec rm -rf {} + 2>/dev/null || true
          find source -name '*Zone.Identifier' -delete 2>/dev/null || true
          find source -type f | sort

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Get iOS SDK path
        id: sdk
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "path=$SDK" >> $GITHUB_OUTPUT

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          git clone --depth=1 https://github.com/theos/sdks.git /tmp/theos-sdks
          cp -r /tmp/theos-sdks/iPhoneOS16.5.sdk $HOME/theos/sdks/ 2>/dev/null || true

      - name: Setup Substrate
        run: |
          mkdir -p $HOME/substrate/include/CydiaSubstrate
          mkdir -p $HOME/substrate/lib
          SUBSTRATE_SRC="$HOME/theos/include/substrate.h"
          [ ! -f "$SUBSTRATE_SRC" ] && curl -fsSL "https://raw.githubusercontent.com/theos/theos/master/include/substrate.h" -o "$SUBSTRATE_SRC" || true
          cp "$SUBSTRATE_SRC" $HOME/substrate/include/substrate.h 2>/dev/null || true
          cp "$SUBSTRATE_SRC" $HOME/substrate/include/CydiaSubstrate.h 2>/dev/null || true
          cp "$SUBSTRATE_SRC" $HOME/substrate/include/CydiaSubstrate/CydiaSubstrate.h 2>/dev/null || true
          VENDOR_SUB="$HOME/theos/vendor/include/substrate.h"
          [ -f "$VENDOR_SUB" ] && cp "$SUBSTRATE_SRC" "$VENDOR_SUB" 2>/dev/null || true
          printf 'void MSHookFunction(void *sym, void *hook, void **old) {}\n' > /tmp/ss.c
          printf 'void MSHookMessageEx(void *cls, void *sel, void *hook, void **old) {}\n' >> /tmp/ss.c
          printf 'void *MSFindSymbol(void *img, const char *name) { return 0; }\n' >> /tmp/ss.c
          printf 'void MSImageRef(void) {}\n' >> /tmp/ss.c
          clang -arch arm64 --target=arm64-apple-ios15.0 -isysroot "${{ steps.sdk.outputs.path }}" -dynamiclib -fPIC /tmp/ss.c -o $HOME/substrate/lib/libsubstrate.dylib || true
          find $HOME/substrate -type f

      - name: Prepare fishhook
        run: |
          if ! find source -name 'fishhook.c' | grep -q .; then
            curl -fsSL "https://raw.githubusercontent.com/facebook/fishhook/main/fishhook.c" -o source/fishhook.c
            curl -fsSL "https://raw.githubusercontent.com/facebook/fishhook/main/fishhook.h" -o source/fishhook.h
          fi

      - name: Clean Linux-only headers
        run: |
          find source -name 'initializer_list' ! -name '*.h' ! -name '*.hpp' -delete 2>/dev/null || true
          find source -path '*/bits/c++config.h' -delete 2>/dev/null || true
          find source -path '*/bits/os_defines.h' -delete 2>/dev/null || true
          echo "Cleaned Linux headers"

      - name: Compile Mixed
        if: github.event.inputs.language == 'mixed'
        run: |
          SDK="${{ steps.sdk.outputs.path }}"
          OUT="${{ github.event.inputs.output_name }}"
          INCLUDES=""
          while IFS= read -r d; do
            [ -d "$d" ] && INCLUDES="$INCLUDES \"-I$d\""
          done < <(
            find source -type d
            echo "$HOME/theos/include"
            echo "$HOME/theos/vendor/include"
            echo "$HOME/substrate/include"
            echo "$HOME/substrate/include/CydiaSubstrate"
          )
          > /tmp/src_cxx.txt
          while IFS= read -r -d '' f; do
            echo "\"$f\"" >> /tmp/src_cxx.txt
          done < <(find source \( -name "*.mm" -o -name "*.mmh" -o -name "*.cpp" -o -name "*.cxx" -o -name "*.cc" -o -name "*.c++" \) -print0)
          > /tmp/src_m.txt
          while IFS= read -r -d '' f; do
            echo "\"$f\"" >> /tmp/src_m.txt
          done < <(find source -name "*.m" -print0)
          > /tmp/src_c.txt
          while IFS= read -r -d '' f; do
            echo "\"$f\"" >> /tmp/src_c.txt
          done < <(find source -name "*.c" -print0)
          SOURCES_CXX=$(cat /tmp/src_cxx.txt | tr '\n' ' ')
          SOURCES_M=$(cat /tmp/src_m.txt | tr '\n' ' ')
          SOURCES_C=$(cat /tmp/src_c.txt | tr '\n' ' ')
          LDFLAGS=""
          [ -f "$HOME/substrate/lib/libsubstrate.dylib" ] && LDFLAGS="-L$HOME/substrate/lib -lsubstrate"
          FRAMEWORKS="-framework Foundation -framework UIKit -framework CoreGraphics -framework CoreFoundation -framework Security -framework CoreMotion -framework AVFoundation"
          if [ -s /tmp/src_cxx.txt ]; then
            eval clang++ -arch arm64 --target=arm64-apple-ios15.0 -isysroot \"$SDK\" -c -std=c++17 -fobjc-arc -DTHEOS_LEAN_AND_MEAN -DTARGET_OS_IPHONE=1 -Wno-deprecated-declarations -Wno-unused-comparison $INCLUDES $SOURCES_CXX || true
          fi
          if [ -s /tmp/src_m.txt ]; then
            eval clang -arch arm64 --target=arm64-apple-ios15.0 -isysroot \"$SDK\" -c -fobjc-arc -DTHEOS_LEAN_AND_MEAN -DTARGET_OS_IPHONE=1 -Wno-deprecated-declarations $INCLUDES $SOURCES_M || true
          fi
          if [ -s /tmp/src_c.txt ]; then
            eval clang -arch arm64 --target=arm64-apple-ios15.0 -isysroot \"$SDK\" -c -Wno-deprecated-declarations $INCLUDES $SOURCES_C || true
          fi
          OBJ_FILES=$(find . -maxdepth 1 -name "*.o" | tr '\n' ' ')
          echo "=== Linking ==="
          clang++ -arch arm64 --target=arm64-apple-ios15.0 -isysroot "$SDK" -dynamiclib -fPIC -lobjc $FRAMEWORKS $LDFLAGS $OBJ_FILES -o "$OUT"
          file "$OUT" && ls -lh "$OUT"

      - name: Compile C
        if: github.event.inputs.language == 'c'
        run: |
          INCLUDES=$(find source -type d | sed 's/.*/-I"&"/' | tr '\n' ' ')
          > /tmp/src.txt
          while IFS= read -r -d '' f; do echo "\"$f\"" >> /tmp/src.txt; done < <(find source -name "*.c" -print0)
          SOURCES=$(cat /tmp/src.txt | tr '\n' ' ')
          eval clang -arch arm64 --target=arm64-apple-ios15.0 -isysroot "${{ steps.sdk.outputs.path }}" -dynamiclib -fPIC -std=c11 -O2 $INCLUDES $SOURCES -o "${{ github.event.inputs.output_name }}"

      - name: Compile C++
        if: github.event.inputs.language == 'cpp'
        run: |
          INCLUDES=$(find source -type d | sed 's/.*/-I"&"/' | tr '\n' ' ')
          > /tmp/src.txt
          while IFS= read -r -d '' f; do echo "\"$f\"" >> /tmp/src.txt; done < <(find source \( -name "*.cpp" -o -name "*.cxx" -o -name "*.cc" -o -name "*.c" \) -print0)
          SOURCES=$(cat /tmp/src.txt | tr '\n' ' ')
          eval clang++ -arch arm64 --target=arm64-apple-ios15.0 -isysroot "${{ steps.sdk.outputs.path }}" -dynamiclib -fPIC -std=c++17 -O2 $INCLUDES $SOURCES -o "${{ github.event.inputs.output_name }}"

      - name: Compile Swift
        if: github.event.inputs.language == 'swift'
        run: |
          SOURCES=$(find source -name "*.swift" | tr '\n' ' ')
          MODULE=$(echo "${{ github.event.inputs.output_name }}" | sed 's/\.dylib//' | tr '-' '_' | tr '.' '_')
          swiftc -target arm64-apple-ios15.0 -sdk "${{ steps.sdk.outputs.path }}" -emit-library -module-name "$MODULE" -O $SOURCES -o "${{ github.event.inputs.output_name }}"

      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: dylib-output-${{ github.event.inputs.job_id }}
          path: ${{ github.event.inputs.output_name }}
          retention-days: 1
