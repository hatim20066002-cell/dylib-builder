name: Build DyLib

on:
  workflow_dispatch:
    inputs:
      archive_url:
        description: 'Download URL for the source archive'
        required: true
      language:
        description: 'Language: c, cpp, swift, mixed'
        required: true
      output_name:
        description: 'Output .dylib filename'
        required: true
      job_id:
        description: 'Unique job ID for tracking'
        required: true

jobs:
  build:
    runs-on: macos-latest

    steps:

      - name: Download and extract source archive
        run: |
          curl -fL "${{ github.event.inputs.archive_url }}" -o project.archive
          mkdir -p source
          if unzip -q project.archive -d source 2>/dev/null; then
            echo "Extracted as ZIP"
          elif tar -xzf project.archive -C source 2>/dev/null; then
            echo "Extracted as tar.gz"
          else
            echo "ERROR" && exit 1
          fi
          find source -name '__MACOSX' -exec rm -rf {} + 2>/dev/null || true
          find source -name '*Zone.Identifier' -delete 2>/dev/null || true
          find source -type f | sort

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Get iOS SDK path
        id: sdk
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "path=$SDK" >> $GITHUB_OUTPUT

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          git clone --depth=1 https://github.com/theos/sdks.git /tmp/theos-sdks
          cp -r /tmp/theos-sdks/iPhoneOS16.5.sdk $HOME/theos/sdks/ 2>/dev/null || true

      - name: Setup Substrate stub
        run: |
          mkdir -p $HOME/substrate/include $HOME/substrate/lib
          cp $HOME/theos/include/substrate.h $HOME/substrate/include/substrate.h 2>/dev/null || true
          cp $HOME/substrate/include/substrate.h $HOME/substrate/include/CydiaSubstrate.h 2>/dev/null || true
          printf 'void MSHookFunction(void *sym, void *hook, void **old) {}\n' > /tmp/substrate_stub.c
          printf 'void MSHookMessageEx(void *cls, void *sel, void *hook, void **old) {}\n' >> /tmp/substrate_stub.c
          printf 'void *MSFindSymbol(void *img, const char *name) { return 0; }\n' >> /tmp/substrate_stub.c
          printf 'void MSImageRef(void) {}\n' >> /tmp/substrate_stub.c
          clang -arch arm64 --target=arm64-apple-ios15.0 -isysroot "${{ steps.sdk.outputs.path }}" -dynamiclib -fPIC /tmp/substrate_stub.c -o $HOME/substrate/lib/libsubstrate.dylib || true

      - name: Prepare fishhook
        run: |
          if ! find source -name 'fishhook.c' | grep -q .; then
            curl -fsSL "https://raw.githubusercontent.com/facebook/fishhook/main/fishhook.c" -o source/fishhook.c
            curl -fsSL "https://raw.githubusercontent.com/facebook/fishhook/main/fishhook.h" -o source/fishhook.h
          fi

      - name: Compile Mixed
        if: github.event.inputs.language == 'mixed'
        run: |
          SDK="${{ steps.sdk.outputs.path }}"
          OUT="${{ github.event.inputs.output_name }}"
          find source -type d > /tmp/inc_dirs.txt
          echo "$HOME/theos/include" >> /tmp/inc_dirs.txt
          echo "$HOME/theos/vendor/include" >> /tmp/inc_dirs.txt
          echo "$HOME/substrate/include" >> /tmp/inc_dirs.txt
          INCLUDES=""
          while IFS= read -r d; do
            [ -d "$d" ] && INCLUDES="$INCLUDES -I$d"
          done < /tmp/inc_dirs.txt
          SOURCES=$(find source \( -name "*.m" -o -name "*.mm" -o -name "*.mmh" -o -name "*.cpp" -o -name "*.cxx" -o -name "*.cc" -o -name "*.c" \) | tr '\n' ' ')
          LDFLAGS=""
          [ -f "$HOME/substrate/lib/libsubstrate.dylib" ] && LDFLAGS="-L$HOME/substrate/lib -lsubstrate"
          clang++ -arch arm64 --target=arm64-apple-ios15.0 -isysroot "$SDK" -dynamiclib -fPIC -std=c++17 -fobjc-arc -fmodules -DTHEOS_LEAN_AND_MEAN -DTARGET_OS_IPHONE=1 -framework Foundation -framework UIKit -framework CoreGraphics -framework CoreFoundation -framework Security -lobjc $LDFLAGS $INCLUDES $SOURCES -o "$OUT"
          file "$OUT" && ls -lh "$OUT"

      - name: Compile C
        if: github.event.inputs.language == 'c'
        run: |
          INCLUDES=$(find source -type d | sed 's/^/-I/' | tr '\n' ' ')
          SOURCES=$(find source -name "*.c" | tr '\n' ' ')
          clang -arch arm64 --target=arm64-apple-ios15.0 -isysroot "${{ steps.sdk.outputs.path }}" -dynamiclib -fPIC -std=c11 -O2 $INCLUDES $SOURCES -o "${{ github.event.inputs.output_name }}"

      - name: Compile C++
        if: github.event.inputs.language == 'cpp'
        run: |
          INCLUDES=$(find source -type d | sed 's/^/-I/' | tr '\n' ' ')
          SOURCES=$(find source \( -name "*.cpp" -o -name "*.cxx" -o -name "*.cc" -o -name "*.c" \) | tr '\n' ' ')
          clang++ -arch arm64 --target=arm64-apple-ios15.0 -isysroot "${{ steps.sdk.outputs.path }}" -dynamiclib -fPIC -std=c++17 -O2 $INCLUDES $SOURCES -o "${{ github.event.inputs.output_name }}"

      - name: Compile Swift
        if: github.event.inputs.language == 'swift'
        run: |
          SOURCES=$(find source -name "*.swift" | tr '\n' ' ')
          MODULE=$(echo "${{ github.event.inputs.output_name }}" | sed 's/\.dylib//' | tr '-' '_' | tr '.' '_')
          swiftc -target arm64-apple-ios15.0 -sdk "${{ steps.sdk.outputs.path }}" -emit-library -module-name "$MODULE" -O $SOURCES -o "${{ github.event.inputs.output_name }}"

      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: dylib-output-${{ github.event.inputs.job_id }}
          path: ${{ github.event.inputs.output_name }}
          retention-days: 1
